name: Build Free IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare Web Directory
        run: |
          mkdir -p www
          find . -maxdepth 1 -type f -not -name ".*" -not -name "App.ipa" -exec cp {} www/ \;
          find . -maxdepth 1 -type d -not -name "." -not -name ".." -not -name ".git" -not -name ".github" -not -name "www" -exec cp -r {} www/ \;

      - name: Install Capacitor & Framework
        run: |
          npm install @capacitor/core@latest @capacitor/cli@latest
          npx cap init "Cocktails App" "com.deinname.cocktailapp" --web-dir=www
          npm install @capacitor/ios@latest
          npx cap add ios

      - name: Sync Web Files to iOS Project
        run: |
          npx cap sync ios

      # FIX: Wir fügen 'continue-on-error' hinzu, damit der Signier-Fehler den Build nicht blockiert
      - name: Build IPA via Xcode (Unsigned)
        continue-on-error: true
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj -scheme App -configuration Release -sdk iphoneos -destination 'generic/platform=iOS' IPHONEOS_DEPLOYMENT_TARGET=14.0 CODE_SIGNING_ALLOWED=NO clean build

      # FIX: Wir suchen die .app Datei jetzt radikal über das gesamte System, damit nichts schiefgeht
      - name: Package into IPA Folder
        run: |
          mkdir -p Payload
          APP_PATH=$(find /Users/runner/Library/Developer/Xcode/DerivedData -name "*.app" -type d | grep -v "Index.noindex" | head -n 1)
          echo "Gefundener App-Pfad: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          zip -r App.ipa Payload

      - name: Upload IPA Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cocktails-app-ipa
          path: App.ipa
