name: Build Free IPA via Cordova

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Schritt 3: Installiert Cordova und zieht sich DEINE config.xml sowie DEIN Icon
      - name: Install Cordova & Create Project
        run: |
          npm install -g cordova
          # Erstellt das temporäre Arbeitsverzeichnis
          cordova create htmlapp com.dummy.app "DummyApp"
          
          # AUTOMATISIERUNG: Überschreibt die Standard-Config mit deiner config.xml aus dem Repo
          if [ -f "config.xml" ]; then cp config.xml htmlapp/config.xml; fi
          
          # Kopiert dein Icon, falls du eins im Ordner "res" hinterlegt hast
          mkdir -p htmlapp/res
          if [ -f "res/icon.png" ]; then cp res/icon.png htmlapp/res/icon.png; fi

      # Kopiert deine Cocktail-Webseiten-Dateien in den App-Ordner
      - name: Copy Web Files
        run: |
          rm -rf htmlapp/www/*
          find . -maxdepth 1 -type f -not -name ".*" -not -name "config.xml" -exec cp {} htmlapp/www/ \;
          find . -maxdepth 1 -type d -not -name "." -not -name ".." -not -name ".git" -not -name ".github" -not -name "htmlapp" -not -name "res" -exec cp -r {} htmlapp/www/ \;

      - name: Add iOS Platform
        run: |
          cd htmlapp
          cordova platform add ios
          cordova prepare ios

      - name: Inject Fake Development Team
        run: |
          PROJ_PATH="htmlapp/platforms/ios/App.xcodeproj/project.pbxproj"
          sed -i '' 's/DevelopmentTeam = "";/DevelopmentTeam = "12345ABCDE";/g' "$PROJ_PATH" || true

      - name: Direct Native Xcode Build (Unsigned)
        run: |
          cd htmlapp/platforms/ios
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos -destination 'generic/platform=iOS' IPHONEOS_DEPLOYMENT_TARGET=14.0 CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" PROVISIONING_PROFILE_SPECIFIER="" PROVISIONING_PROFILE="" clean build

      - name: Package into IPA Folder
        run: |
          mkdir -p Payload
          APP_PATH=$(find /Users/runner/Library/Developer/Xcode/DerivedData -name "*.app" -type d | grep "Release-iphoneos" | head -n 1)
          echo "App gefunden unter: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          zip -r App.ipa Payload

      - name: Upload IPA Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cocktails-app-ipa
          path: App.ipa
