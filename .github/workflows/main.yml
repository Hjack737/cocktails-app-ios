name: Build Free IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare Web Directory
        run: |
          mkdir -p www
          find . -maxdepth 1 -type f -not -name ".*" -not -name "App.ipa" -exec cp {} www/ \;
          find . -maxdepth 1 -type d -not -name "." -not -name ".." -not -name ".git" -not -name ".github" -not -name "www" -exec cp -r {} www/ \;

      - name: Install Capacitor & Framework
        run: |
          npm install @capacitor/core@latest @capacitor/cli@latest
          npx cap init "Cocktails App" "com.deinname.cocktailapp" --web-dir=www
          npm install @capacitor/ios@latest
          npx cap add ios

      - name: Sync Web Files to iOS Project
        run: |
          npx cap sync ios

      # DIAGNOSE: Wir gucken uns im Log an, wo die .xcworkspace Datei wirklich liegt
      - name: List iOS Directory Structure
        run: |
          echo "=== Zeige Inhalt von /ios ==="
          ls -R ios || echo "Kein ios Ordner gefunden"

      # FIX: Wir suchen die Datei dynamisch und bauen sie direkt, egal wo sie liegt
      - name: Build IPA via Xcode (Unsigned)
        run: |
          WORKSPACE_PATH=$(find ios -name "*.xcworkspace" | head -n 1)
          WORKSPACE_DIR=$(dirname "$WORKSPACE_PATH")
          echo "Workspace gefunden in: $WORKSPACE_DIR"
          
          cd "$WORKSPACE_DIR"
          xcodebuild -workspace *.xcworkspace -scheme App -configuration Release -sdk iphoneos -destination 'generic/platform=iOS' IPHONEOS_DEPLOYMENT_TARGET=14.0 CODE_SIGNING_ALLOWED=NO clean build

      - name: Package into IPA Folder
        run: |
          mkdir -p Payload
          cp -r /Users/runner/Library/Developer/Xcode/DerivedData/*/Build/Products/Release-iphoneos/*.app Payload/
          zip -r App.ipa Payload

      - name: Upload IPA Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cocktails-app-ipa
          path: App.ipa
