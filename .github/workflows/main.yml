name: Build Free IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Bereitet den Web-Ordner vor (Ignoriert alte Build-Reste)
      - name: Prepare Web Directory
        run: |
          mkdir -p www
          find . -maxdepth 1 -type f -not -name ".*" -not -name "App.ipa" -exec cp {} www/ \;
          find . -maxdepth 1 -type d -not -name "." -not -name ".." -not -name ".git" -not -name ".github" -not -name "www" -exec cp -r {} www/ \;

      - name: Install Capacitor & Framework
        run: |
          npm install @capacitor/core@latest @capacitor/cli@latest
          npx cap init "Cocktails App" "com.deinname.cocktailapp" --web-dir=www
          npm install @capacitor/ios@latest
          npx cap add ios

      - name: Sync Web Files to iOS Project
        run: |
          npx cap sync ios

      # FIX: Wir deaktivieren die strikte Zertifikatspflicht direkt in den Xcode-Einstellungen vor dem Build
      - name: Disable Code Signing in Project Settings
        run: |
          sed -i '' 's/CODE_SIGNING_ALLOWED = YES/CODE_SIGNING_ALLOWED = NO/g' ios/App/App.xcodeproj/project.pbxproj || true

      # FIX: Wir nutzen den "archive" Befehl. Das zwingt Xcode, die App sauber fertigzustellen, ohne am Ende abzustürzen.
      - name: Build Xcode Archive
        run: |
          cd ios/App
          xcodebuild archive -project App.xcodeproj -scheme App -archivePath ./build/App.xcarchive -sdk iphoneos -destination 'generic/platform=iOS' IPHONEOS_DEPLOYMENT_TARGET=14.0 CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""

      # FIX: Wir holen uns die App direkt aus dem fertigen Archiv-Container
      - name: Package into IPA Folder
        run: |
          mkdir -p Payload
          cp -r ios/App/build/App.xcarchive/Products/Applications/App.app Payload/
          chmod +x Payload/App.app/App
          zip -r App.ipa Payload

      - name: Upload IPA Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cocktails-app-ipa
          path: App.ipa
