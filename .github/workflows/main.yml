name: Build Free IPA via Cordova

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Cordova läuft perfekt und stabil auf Node 20

      # FIX: Wir bauen eine saubere Cordova-Struktur auf dem Server auf
      - name: Install Cordova & Create Project
        run: |
          npm install -g cordova
          cordova create htmlapp com.deinname.cocktailapp "Cocktails App"
          
      # FIX: Wir schieben deine HTML-Dateien in den korrekten www-Ordner
      - name: Copy Web Files
        run: |
          rm -rf htmlapp/www/*
          find . -maxdepth 1 -type f -not -name ".*" -exec cp {} htmlapp/www/ \;
          find . -maxdepth 1 -type d -not -name "." -not -name ".." -not -name ".git" -not -name ".github" -not -name "htmlapp" -exec cp -r {} htmlapp/www/ \;

      - name: Add iOS Platform
        run: |
          cd htmlapp
          cordova platform add ios
          cordova prepare ios

      # FIX: Wir zwingen Xcode über ein Build-Config-File dazu, jegliches Signieren komplett zu ignorieren
      - name: Configure Xcode Build Settings
        run: |
          mkdir -p htmlapp/platforms/ios/cordova
          echo '{\
            "ios": {\
              "release": {\
                "codeSignIdentity": "",\
                "developmentTeam": "",\
                "packageType": "ad-hoc",\
                "provisioningProfile": ""\
              }\
            }\
          }' > htmlapp/build.json

      # FIX: Der eigentliche Compile-Vorgang über Cordova (rennt ohne Swift-Fehler durch)
      - name: Build Xcode Project
        run: |
          cd htmlapp
          cordova build ios --release --device -- --CODE_SIGNING_ALLOWED=NO --CODE_SIGNING_REQUIRED=NO

      # FIX: Verpacken der fertigen .app in eine saubere .ipa für SideStore
      - name: Package into IPA Folder
        run: |
          mkdir -p Payload
          APP_PATH=$(find htmlapp/platforms/ios/build/device -name "*.app" -type d | head -n 1)
          echo "App gefunden unter: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          zip -r App.ipa Payload

      - name: Upload IPA Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cocktails-app-ipa
          path: App.ipa
