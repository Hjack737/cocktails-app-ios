name: Build Free IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare Web Directory
        run: |
          mkdir -p www
          find . -maxdepth 1 -type f -not -name ".*" -not -name "App.ipa" -exec cp {} www/ \;
          find . -maxdepth 1 -type d -not -name "." -not -name ".." -not -name ".git" -not -name ".github" -not -name "www" -exec cp -r {} www/ \;

      - name: Install Capacitor & Framework
        run: |
          npm install @capacitor/core@latest @capacitor/cli@latest
          npx cap init "Cocktails App" "com.deinname.cocktailapp" --web-dir=www
          npm install @capacitor/ios@latest
          npx cap add ios

      - name: Sync Web Files to iOS Project
        run: |
          npx cap sync ios

      # FIX: Wir nutzen CODE_SIGNING_REQUIRED=NO (statt ALLOWED=NO), das erzeugt die Binärdatei sauberer
      - name: Build IPA via Xcode (Unsigned)
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj -scheme App -configuration Release -sdk iphoneos -destination 'generic/platform=iOS' IPHONEOS_DEPLOYMENT_TARGET=14.0 CODE_SIGN_REQUIRED=NO CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO AD_HOC_CODE_SIGNING_ALLOWED=YES clean build

      # FIX: Wir packen die .app präzise ein und stellen sicher, dass die ausführbare Datei die richtigen Rechte hat
      - name: Package into IPA Folder
        run: |
          mkdir -p Payload
          # Sucht gezielt im Release-Ordner nach der echten App
          TARGET_APP=$(find /Users/runner/Library/Developer/Xcode/DerivedData -name "App.app" -type d | grep "Release-iphoneos" | head -n 1)
          echo "Kopiere App von: $TARGET_APP"
          cp -r "$TARGET_APP" Payload/
          
          # Macht die ausführbare Datei innerhalb der App für iOS lesbar (behebt Bad File Descriptor)
          chmod +x Payload/App.app/App
          
          zip -r App.ipa Payload

      - name: Upload IPA Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cocktails-app-ipa
          path: App.ipa
