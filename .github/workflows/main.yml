name: Build Free IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare Web Directory
        run: |
          mkdir -p www
          find . -maxdepth 1 -type f -not -name ".*" -not -name "App.ipa" -exec cp {} www/ \;
          find . -maxdepth 1 -type d -not -name "." -not -name ".." -not -name ".git" -not -name ".github" -not -name "www" -exec cp -r {} www/ \;

      - name: Install Capacitor & Framework
        run: |
          npm install @capacitor/core@latest @capacitor/cli@latest
          npx cap init "Cocktails App" "com.deinname.cocktailapp" --web-dir=www
          npm install @capacitor/ios@latest
          npx cap add ios

      # FIX: Wir synchronisieren das Projekt ZUERST. Das erstellt alle iOS-Dateien fehlerfrei.
      - name: Sync Web Files to iOS Project
        run: |
          npx cap sync ios

      # FIX: Wir sagen Xcode beim Kompilieren direkt, dass es iOS 14+ nutzen soll, ohne im Podfile herumzufummeln
      - name: Build IPA via Xcode (Unsigned)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos -destination 'generic/platform=iOS' IPHONEOS_DEPLOYMENT_TARGET=14.0 CODE_SIGNING_ALLOWED=NO clean build

      - name: Package into IPA Folder
        run: |
          mkdir -p Payload
          cp -r /Users/runner/Library/Developer/Xcode/DerivedData/*/Build/Products/Release-iphoneos/App.app Payload/
          zip -r App.ipa Payload

      - name: Upload IPA Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cocktails-app-ipa
          path: App.ipa
