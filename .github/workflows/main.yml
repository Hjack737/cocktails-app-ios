name: Build Free IPA via Cordova

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Cordova & Create Project
        run: |
          npm install -g cordova
          cordova create htmlapp com.deinname.cocktailapp "Cocktails App"
          
      - name: Copy Web Files
        run: |
          rm -rf htmlapp/www/*
          find . -maxdepth 1 -type f -not -name ".*" -exec cp {} htmlapp/www/ \;
          find . -maxdepth 1 -type d -not -name "." -not -name ".." -not -name ".git" -not -name ".github" -not -name "htmlapp" -exec cp -r {} htmlapp/www/ \;

      - name: Add iOS Platform
        run: |
          cd htmlapp
          cordova platform add ios
          cordova prepare ios

      # FIX: Wir injizieren eine Fake-Team-ID direkt in die Xcode-Projektdatei, um den Fehler zu umgehen
      - name: Inject Fake Development Team
        run: |
          PROJ_PATH="htmlapp/platforms/ios/App.xcodeproj/project.pbxproj"
          sed -i '' 's/DevelopmentTeam = "";/DevelopmentTeam = "12345ABCDE";/g' "$PROJ_PATH" || true
          # Falls der Wert noch gar nicht existiert, fügen wir ihn in die Target-Attribute ein
          sed -i '' 's/TargetAttributes = {/TargetAttributes = {\
            "1D6051220E11D67400C2174A" = {\
              DevelopmentTeam = 12345ABCDE;\
            };/g' "$PROJ_PATH" || true

      - name: Configure Xcode Build Settings
        run: |
          echo '{"ios":{"release":{"codeSignIdentity":"","developmentTeam":"12345ABCDE","packageType":"ad-hoc","provisioningProfile":""}}}' > htmlapp/build.json

      # FIX: Wir erlauben Ad-Hoc-Signierung ohne echtes Zertifikat
      - name: Build Xcode Project
        run: |
          cd htmlapp
          cordova build ios --release --device -- --CODE_SIGNING_ALLOWED=NO --CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""

      - name: Package into IPA Folder
        run: |
          mkdir -p Payload
          APP_PATH=$(find htmlapp/platforms/ios/build/device -name "*.app" -type d | head -n 1)
          echo "App gefunden unter: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          zip -r App.ipa Payload

      - name: Upload IPA Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cocktails-app-ipa
          path: App.ipa
