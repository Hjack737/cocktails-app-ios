name: Auto Release on Main

on:
  workflow_run:
    # Hört jetzt exakt auf den Namen deines iOS-Workflows
    workflows: ["Build IPA"]
    types:
      - completed

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    # Läuft nur, wenn der iOS-Build auf dem main-Branch erfolgreich war
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. APK-Artefakt herunterladen (sucht nach dem neuesten erfolgreichen Artefakt auf dem Branch)
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: cocktails-app-apk # Exakter Name aus deiner apk.yml
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # 2. IPA-Artefakt herunterladen (holt es direkt aus dem aktuell beendeten iOS-Lauf)
      - name: Download iOS IPA
        uses: actions/download-artifact@v4
        with:
          name: cocktails-app-ipa # Exakter Name aus deiner ipa.yml
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      # 3. Dynamischen Tag-Namen generieren
      - name: Generate Tag Name
        id: tag
        run: |
          echo "release_tag=v${{ github.run_number }}-auto" >> $GITHUB_OUTPUT
          echo "current_date=$(date +'%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT

      # 4. Release erstellen und beide entpackten Dateien hochladen (Keine ZIPs!)
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: "Automatischer Release ${{ steps.tag.outputs.release_tag }}"
          body: |
            Dieser Release wurde automatisch nach erfolgreichem Build auf dem `main`-Branch erstellt.
            **Erstellungsdatum:** ${{ steps.tag.outputs.current_date }}
          draft: false
          prerelease: false
          files: |
            **/*.apk
            **/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
