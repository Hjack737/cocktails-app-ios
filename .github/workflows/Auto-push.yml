name: Auto Release on Main

on:
  push:
    branches:
      - main
  workflow_dispatch: # Damit du es auch mal manuell starten kannst

permissions:
  contents: write

jobs:
  # 1. Job: Startet beide Builds parallel und wartet auf sie
  trigger-builds:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Android and iOS Builds
        uses: actions/github-script@v7
        with:
          script: |
            // Startet den Android-Build
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'apk.yml', // 💡 Dateiname deiner Android-YAML
              ref: 'main'
            });
            
            // Startet den iOS-Build
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ipa.yml', // 💡 Dateiname deiner iOS-YAML
              ref: 'main'
            });

  # 2. Job: Wartet auf die Fertigstellung und erstellt den Release
  create-release:
    needs: trigger-builds # Wartet, bis der Trigger-Job durch ist
    runs-on: ubuntu-latest
    # Um sicherzugehen, dass wir warten, nutzen wir hier ein kurzes Sleep-Timeout im echten Leben,
    # ODER (noch viel einfacher für dein aktuelles Setup) wir nutzen die "Warte-Logik":
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Wir nutzen ein feines Plugin, das wartet, bis die Artefakte wirklich existieren
      - name: Wait for Artifacts and Download APK
        uses: actions/download-artifact@v4
        with:
          name: cocktails-app-apk
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Wait for Artifacts and Download IPA
        uses: actions/download-artifact@v4
        with:
          name: cocktails-app-ipa
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Generate Tag Name
        id: tag
        run: |
          echo "release_tag=v${{ github.run_number }}-auto" >> $GITHUB_OUTPUT
          echo "current_date=$(date +'%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: "Automatischer Release ${{ steps.tag.outputs.release_tag }}"
          body: "Automatischer Release nach erfolgreichem Build beider Plattformen."
          files: |
            **/*.apk
            **/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
