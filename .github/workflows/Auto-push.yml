name: Auto Release on Main

on:
  workflow_run:
    # 💡 HIER KORRIGIERT: Muss exakt dem 'name:' aus deiner apk.yml entsprechen!
    workflows: ["Build APK", "Build iOS IPA"] 
    types:
      - completed

permissions:
  contents: write 

jobs:
  create-release:
    runs-on: ubuntu-latest
    # 💡 OPTIMIERT: Läuft nur, wenn der auslösende Build erfolgreich war UND auf dem main-Branch stattfand
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. APK-Artefakt aus dem Android-Workflow herunterladen
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: cocktails-app-apk # 💡 Passt perfekt zu deinem 'upload-artifact' Namen!
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      # 2. IPA-Artefakt aus dem iOS-Workflow herunterladen
      - name: Download iOS IPA
        uses: actions/download-artifact@v4
        with:
          name: cocktails-app-ipa 
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
        continue-on-error: true # Falls der iOS-Workflow mal nicht lief, bricht der Release nicht komplett ab

      # 3. Dynamischen Tag-Namen generieren
      - name: Generate Tag Name
        id: tag
        run: |
          echo "release_tag=v${{ github.run_number }}-auto" >> $GITHUB_OUTPUT
          echo "current_date=$(date +'%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT

      # 4. Release erstellen und Artefakte hochladen
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: "Automatischer Release ${{ steps.tag.outputs.release_tag }}"
          body: |
            Dieser Release wurde automatisch nach erfolgreichem Build auf dem `main`-Branch erstellt.
            **Erstellungsdatum:** ${{ steps.tag.outputs.current_date }}
          draft: false
          prerelease: false
          files: |
            **/*.apk
            **/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
