<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCA - Hjacks Cocktail App</title>
    
    <link rel="icon" type="image/png" href="https://img.icons8.com/ios-filled/50/ffffff/cocktail.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0b0f1a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(23, 32, 53, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .cocktail-card { transition: all 0.4s ease; }
        .cocktail-card:hover { transform: translateY(-5px); border-color: #38bdf8; box-shadow: 0 10px 30px -10px rgba(56, 189, 248, 0.4); }
        .gradient-text { background: linear-gradient(135deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .img-placeholder { background: linear-gradient(45deg, #1e293b, #0f172a); }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Custom Scrollbar für die Zutatenliste */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(56, 189, 248, 0.2); border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: rgba(56, 189, 248, 0.4); }
    </style>
</head>
<body class="min-h-screen">

    <header class="sticky top-0 z-50 glass px-6 py-4 shadow-2xl">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-3">
                <div class="bg-sky-500 p-2 rounded-xl shadow-[0_0_15px_rgba(56,189,248,0.5)]">
                    <i class="fas fa-cocktail text-white text-xl"></i>
                </div>
                <h1 class="text-2xl font-black tracking-tight gradient-text uppercase">hjacks cocktail app</h1>
            </div>
            
            <div class="relative w-full md:w-1/3">
                <input type="text" id="searchInput" placeholder="Cocktail oder Zutat suchen..." 
                    class="w-full bg-slate-900 border border-slate-700 rounded-2xl py-3 px-12 focus:outline-none focus:ring-2 focus:ring-sky-500 transition-all">
                <i class="fas fa-search absolute left-4 top-3.5 text-slate-500"></i>
            </div>

            <div class="flex items-center gap-2 flex-wrap justify-center">
                <button onclick="toggleBar()" class="flex items-center gap-2 bg-emerald-500/10 hover:bg-emerald-500/20 border border-emerald-500/30 px-5 py-2.5 rounded-2xl transition-all">
                    <i class="fas fa-wine-bottle text-emerald-400"></i>
                    <span class="font-medium text-sm text-emerald-100">Meine Bar</span>
                </button>
                <button onclick="toggleLists()" class="flex items-center gap-2 bg-sky-500/10 hover:bg-sky-500/20 border border-sky-500/30 px-5 py-2.5 rounded-2xl transition-all">
                    <i class="fas fa-heart text-sky-400"></i>
                    <span class="font-medium text-sm text-sky-100">Favoriten</span>
                </button>
                <button onclick="toggleBackup()" title="Backup" class="w-11 h-11 flex items-center justify-center bg-slate-800 hover:bg-slate-700 rounded-2xl border border-slate-700 transition-all">
                    <i class="fas fa-sync-alt text-slate-400"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-10">

        <section id="backupSection" class="hidden mb-12 p-8 glass rounded-[2.5rem] border-2 border-dashed border-sky-500/20 animate-fade-in">
            <div class="flex items-center gap-3 mb-6">
                <i class="fas fa-cloud-upload-alt text-sky-400 text-xl"></i>
                <h2 class="text-xl font-bold">Backup & Restore (inkl. Bar-Zutaten)</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-3">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Export (Code kopieren)</label>
                    <textarea id="exportArea" readonly class="w-full h-24 bg-black/40 rounded-2xl p-4 text-[10px] font-mono border border-white/5 focus:outline-none"></textarea>
                    <button onclick="copyExport()" class="w-full bg-sky-600 hover:bg-sky-500 py-3 rounded-xl text-xs font-bold uppercase transition-all">Code Kopieren</button>
                </div>
                <div class="space-y-3">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Import (Code einfügen)</label>
                    <textarea id="importArea" class="w-full h-24 bg-black/40 rounded-2xl p-4 text-[10px] font-mono border border-white/5 focus:ring-1 focus:ring-purple-500 outline-none" placeholder="Hier Backup-Code einfügen..."></textarea>
                    <button onclick="importData()" class="w-full bg-purple-600 hover:bg-purple-500 py-3 rounded-xl text-xs font-bold uppercase transition-all">Wiederherstellen</button>
                </div>
            </div>
        </section>

        <section id="barSection" class="hidden mb-12 p-8 glass rounded-[2.5rem] border border-emerald-500/20 animate-fade-in">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
                <div class="flex items-center gap-3">
                    <i class="fas fa-wine-bottle text-emerald-400 text-xl"></i>
                    <div>
                        <h2 class="text-xl font-bold text-emerald-500">Meine Bar</h2>
                        <p class="text-xs text-slate-400 mt-0.5">Wähle deine Zutaten. Es werden nur Cocktails angezeigt, die du komplett mixen kannst.</p>
                    </div>
                </div>
                <div class="flex gap-2 w-full md:w-auto">
                    <input type="text" id="barSearchInput" oninput="filterBarIngredients()" placeholder="Zutat in Bar suchen..." 
                        class="bg-slate-900 border border-slate-700 rounded-xl py-2 px-4 text-sm focus:outline-none focus:ring-1 focus:ring-emerald-500 w-full md:w-64">
                    <button onclick="clearBar()" class="bg-red-500/10 hover:bg-red-500/20 border border-red-500/30 text-red-400 text-xs px-4 py-2 rounded-xl transition-all font-medium whitespace-nowrap">
                        Leeren
                    </button>
                </div>
            </div>
            
            <div id="barIngredientsGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 max-h-96 overflow-y-auto pr-2 custom-scroll">
                </div>
        </section>
        
        <section id="listsSection" class="hidden mb-12 animate-fade-in">
            <h2 class="text-xl font-bold mb-6 flex items-center gap-2 text-sky-100">
                <i class="fas fa-star text-yellow-500"></i> Deine Sammlung
            </h2>
            <div id="savedLists" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
            <div class="h-px bg-gradient-to-r from-transparent via-slate-800 to-transparent mt-12"></div>
        </section>

        <div id="filterStatus" class="hidden mb-6 flex justify-between items-center bg-emerald-500/5 border border-emerald-500/10 p-4 rounded-2xl animate-fade-in">
            <span class="text-sm text-emerald-400/90 flex items-center gap-2">
                <i class="fas fa-filter"></i>
                <span>Filter aktiv: Zeige nur passende Rezepte für deine Bar-Zutaten.</span>
            </span>
            <button onclick="clearBar()" class="text-xs text-slate-400 hover:text-white underline">Filter deaktivieren</button>
        </div>

        <div id="cocktailGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <div class="col-span-full flex flex-col items-center justify-center py-40">
                <div class="w-12 h-12 border-4 border-sky-500 border-t-transparent rounded-full animate-spin"></div>
                <p class="mt-4 text-slate-400 font-medium">Mixe Rezepte zusammen...</p>
            </div>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 bg-slate-950/90 hidden z-[100] overflow-y-auto backdrop-blur-md p-4">
        <div class="min-h-screen flex items-center justify-center">
            <div class="glass max-w-4xl w-full rounded-[2.5rem] overflow-hidden shadow-2xl relative border border-white/10">
                <button onclick="closeModal()" class="absolute top-6 right-6 z-10 w-10 h-10 flex items-center justify-center bg-black/40 hover:bg-black/60 rounded-full text-white transition">
                    <i class="fas fa-times"></i>
                </button>
                <div id="modalContent"></div>
            </div>
        </div>
    </div>

    <script>
        let allCocktails = [];
        let allIngredients = []; // Liste aller eindeutigen Zutaten aus den Rezepten
        
        // EINHEITLICHE KEYS
        let favorites = JSON.parse(localStorage.getItem('hca_favorites_v1')) || [];
        let myBarIngredients = JSON.parse(localStorage.getItem('hca_bar_ingredients_v1')) || [];
        
        const DATA_URL = 'https://raw.githubusercontent.com/rasmusab/iba-cocktails/main/wikipedia/iba-cocktails-wiki.json';

        async function init() {
            try {
                const response = await fetch(DATA_URL);
                allCocktails = await response.json();
                
                // Extrahiere alle einzigartigen Zutaten aus den Cocktail-Daten
                extractUniqueIngredients();
                
                // Initialisiere Bar UI Elemente
                renderBarIngredients();
                
                // Wende Filter an und klinke UI ein
                applyFilters();
                updateBackupText(); 
            } catch (err) {
                document.getElementById('cocktailGrid').innerHTML = `<p class="col-span-full text-center text-red-400">Fehler beim Laden der Daten.</p>`;
            }
        }

        // 1. Die runderneuerte Bereinigungs-Funktion
        function cleanIngredientName(str) {
            if (!str) return '';
            
            // Alles in Kleinbuchstaben umwandeln, um Case-Sensitivity komplett zu eliminieren
            let clean = str.toLowerCase();

            // Alles in Klammern komplett entfernen, z.B. (1 part), (optional)
            clean = clean.replace(/\([^)]*\)/g, '');

            // Typische Mengenangaben am Anfang entfernen (Zahlen, Brüche, cl, ml, oz, etc.)
            clean = clean.replace(/^\d+([./,]\d+)?\s*(cl|ml|oz|fl\s*oz|g|gr)?\s+/g, '');
            clean = clean.replace(/^\d+\/\d+\s*(cl|ml|oz|fl\s*oz|g|gr)?\s+/g, '');
            clean = clean.replace(/^(\d+\s+\d+\/\d+|\d+[-–]\d+)\s*(cl|ml|oz|fl\s*oz|g|gr)?\s+/g, '');

            // Unnötige Text-Mengenangaben und Füllwörter entfernen (Regex ignoriert Groß-/Kleinschreibung durch 'g')
            const phrasesToRemove = [
                /^\s*a\s+splash\s+of\s+/g,
                /^\s*dash\s+of\s+/g,
                /^\s*few\s+dashes\s+(of\s+)?/g,
                /^\s*few\s+drops\s+(of\s+)?/g,
                /^\s*two\s+dashes\s+(of\s+)?/g,
                /^\s*bar\s+spoon\s+(of\s+)?/g,
                /^\s*tablespoon\s+(of\s+)?/g,
                /^\s*teaspoons?\s+(of\s+)?/g,
                /^\s*quarter-sized\s+slices\s+of\s+/g,
                /^\s*garnish\s+with\s+/g,
                /^\s*to\s+top\s+up\s+/g,
                /^\s*fill\s+with\s+/g,
                /^\s*top\s+with\s+/g,
                /^\s*of\s+/g,
                /^\s*to\s+/g,
                /^\s*chilled\s+/g
            ];

            // Alle Phrasen nacheinander wegschneiden
            phrasesToRemove.forEach(regex => {
                clean = clean.replace(regex, '');
            });

            // Whitespaces aufräumen
            clean = clean.trim();

            // Falls nichts übrig bleibt, nimm das Original (in Kleinbuchstaben)
            return clean || str.toLowerCase();
        }

        // 2. Die angepasste Extraktion, die nun sauber auf Kleinbuchstaben setzt
        function extractUniqueIngredients() {
            const ingredientSet = new Set();
            allCocktails.forEach(c => {
                if (c.ingredients && Array.isArray(c.ingredients)) {
                    c.ingredients.forEach(ing => {
                        let cleanName = cleanIngredientName(ing);
                        if(cleanName) ingredientSet.add(cleanName);
                    });
                }
            });
    
    // Array sortieren und für die Anzeige den ersten Buchstaben groß machen
    allIngredients = Array.from(ingredientSet)
        .map(ing => ing.charAt(0).toUpperCase() + ing.slice(1))
        .sort((a, b) => a.localeCompare(b));
}

        // Überprüft, ob ein Cocktail alle ausgewählten Bar-Zutaten besitzt
        function canMix(cocktail) {
            if (myBarIngredients.length === 0) return true; // Wenn Bar leer, alles zeigen
            
            // Ein Cocktail ist mixbar, wenn JEDE seiner Zutaten in 'myBarIngredients' enthalten ist
            return cocktail.ingredients.every(ing => {
                const cleanIng = cleanIngredientName(ing).toLowerCase();
                return myBarIngredients.some(barIng => cleanIng.includes(barIng.toLowerCase()) || barIng.toLowerCase().includes(cleanIng));
            });
        }

        function render(data) {
            const grid = document.getElementById('cocktailGrid');
            
            if(data.length === 0) {
                grid.innerHTML = `<p class="col-span-full text-center text-slate-500 py-20">Keine passenden Cocktails für die aktuelle Auswahl gefunden.</p>`;
                return;
            }

            grid.innerHTML = data.map(c => {
                const isFav = favorites.includes(c.name);
                return `
                <div class="cocktail-card glass rounded-[2rem] overflow-hidden flex flex-col cursor-pointer" onclick="openDetail('${c.name.replace(/'/g, "\\'")}')">
                    <div class="h-64 overflow-hidden relative img-placeholder">
                        <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(c.name)}&background=0f172a&color=38bdf8&size=512" 
                             data-name="${c.name}"
                             class="cocktail-img w-full h-full object-cover opacity-0 transition-opacity duration-500"
                             onload="this.classList.remove('opacity-0')">
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-950/90 via-slate-950/20 to-transparent"></div>
                        <button onclick="event.stopPropagation(); toggleFav('${c.name.replace(/'/g, "\\'")}')" 
                            class="absolute top-4 right-4 w-10 h-10 rounded-full glass flex items-center justify-center hover:scale-110 transition z-10">
                            <i class="${isFav ? 'fas fa-heart text-red-500' : 'far fa-heart text-white'}"></i>
                        </button>
                        <div class="absolute bottom-4 left-6 right-6">
                             <span class="text-[10px] uppercase tracking-widest text-sky-400 font-bold">${c.category || 'Classic'}</span>
                             <h3 class="text-xl font-bold text-white leading-tight truncate">${c.name}</h3>
                        </div>
                    </div>
                </div>`;
            }).join('');
            loadRealImages();
        }

        // Filterlogik steuern (Kombination aus Bar-Auswahl & Suchschlitz)
        function applyFilters() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            
            // 1. Filter nach Bar-Zutaten
            let filtered = allCocktails.filter(canMix);
            
            // 2. Filter nach Textsuche
            if(term) {
                filtered = filtered.filter(c => 
                    c.name.toLowerCase().includes(term) || 
                    c.ingredients.some(i => i.toLowerCase().includes(term))
                );
            }
            
            // Info-Banner über aktive Bar-Filterung umschalten
            const statusBanner = document.getElementById('filterStatus');
            if(myBarIngredients.length > 0) {
                statusBanner.classList.remove('hidden');
            } else {
                statusBanner.addClassList ? statusBanner.classList.add('hidden') : statusBanner.setAttribute('class', 'hidden mb-6 flex justify-between items-center bg-emerald-500/5 border border-emerald-500/10 p-4 rounded-2xl animate-fade-in hidden');
                statusBanner.classList.add('hidden');
            }

            render(filtered);
        }

        async function loadRealImages() {
            const imgs = document.querySelectorAll('.cocktail-img');
            imgs.forEach(async (img) => {
                const name = img.getAttribute('data-name');
                try {
                    const res = await fetch(`https://www.thecocktaildb.com/api/json/v1/1/search.php?s=${encodeURIComponent(name)}`);
                    const data = await res.json();
                    if(data.drinks && data.drinks[0].strDrinkThumb) {
                        img.src = data.drinks[0].strDrinkThumb;
                    }
                } catch(e) { /* Fallback bleibt ui-avatar */ }
            });
        }

        function toggleFav(name) {
            if (favorites.includes(name)) {
                favorites = favorites.filter(n => n !== name);
            } else {
                favorites.push(name);
            }
            localStorage.setItem('hca_favorites_v1', JSON.stringify(favorites));
            applyFilters();
            updateFavUI();
            updateBackupText();
        }

        /* BAR STEUERUNG */
        function toggleBar() {
            const section = document.getElementById('barSection');
            section.classList.toggle('hidden');
        }

        function renderBarIngredients() {
            const grid = document.getElementById('barIngredientsGrid');
            grid.innerHTML = allIngredients.map(ing => {
                const isChecked = myBarIngredients.includes(ing);
                return `
                <label class="ingredient-item flex items-center gap-3 p-3 bg-slate-900/40 hover:bg-slate-800/60 border ${isChecked ? 'border-emerald-500/40 bg-emerald-500/5' : 'border-white/5'} rounded-xl cursor-pointer transition-all select-none">
                    <input type="checkbox" value="${ing}" ${isChecked ? 'checked' : ''} onchange="toggleBarIngredient(this)"
                           class="w-4 h-4 rounded text-emerald-500 bg-slate-950 border-slate-700 focus:ring-emerald-500 focus:ring-opacity-25 focus:ring-2 accent-emerald-500">
                    <span class="text-xs font-medium truncate ${isChecked ? 'text-emerald-200' : 'text-slate-300'}">${ing}</span>
                </label>
                `;
            }).join('');
        }

        function toggleBarIngredient(checkbox) {
            const val = checkbox.value;
            if(checkbox.checked) {
                if(!myBarIngredients.includes(val)) myBarIngredients.push(val);
            } else {
                myBarIngredients = myBarIngredients.filter(i => i !== val);
            }
            localStorage.setItem('hca_bar_ingredients_v1', JSON.stringify(myBarIngredients));
            
            // Optisches Feedback anpassen
            const parent = checkbox.closest('.ingredient-item');
            if(checkbox.checked) {
                parent.classList.add('border-emerald-500/40', 'bg-emerald-500/5');
                parent.querySelector('span').classList.replace('text-slate-300', 'text-emerald-200');
            } else {
                parent.classList.remove('border-emerald-500/40', 'bg-emerald-500/5');
                parent.querySelector('span').classList.replace('text-emerald-200', 'text-slate-300');
            }
            
            applyFilters();
            updateBackupText();
            if(!document.getElementById('listsSection').classList.contains('hidden')) updateFavUI();
        }

        function filterBarIngredients() {
            const term = document.getElementById('barSearchInput').value.toLowerCase();
            const items = document.querySelectorAll('.ingredient-item');
            items.forEach(item => {
                const text = item.querySelector('span').textContent.toLowerCase();
                if(text.includes(term)) {
                    item.classList.remove('hidden');
                } else {
                    item.classList.add('hidden');
                }
            });
        }

        function clearBar() {
            myBarIngredients = [];
            localStorage.setItem('hca_bar_ingredients_v1', JSON.stringify(myBarIngredients));
            document.getElementById('barSearchInput').value = '';
            renderBarIngredients();
            applyFilters();
            updateBackupText();
        }

        function toggleBackup() {
            const section = document.getElementById('backupSection');
            section.classList.toggle('hidden');
            updateBackupText();
        }

        function toggleLists() {
            const section = document.getElementById('listsSection');
            section.classList.toggle('hidden');
            updateFavUI();
        }

        // Exportiert jetzt ein kombiniertes JSON-Objekt aus Favoriten UND Bar-Zutaten
        function updateBackupText() {
            const backupData = {
                favs: favorites,
                bar: myBarIngredients
            };
            const code = btoa(JSON.stringify(backupData));
            document.getElementById('exportArea').value = code;
        }

        function copyExport() {
            const area = document.getElementById('exportArea');
            area.select();
            document.execCommand('copy');
            alert('Backup-Code kopiert!');
        }

        function importData() {
            const code = document.getElementById('importArea').value.trim();
            try {
                const decoded = JSON.parse(atob(code));
                
                // Unterstützung für altes Format (nur Array) und neues Format (Objekt mit favs und bar)
                if (Array.isArray(decoded)) {
                    favorites = decoded;
                    myBarIngredients = [];
                } else if (decoded && typeof decoded === 'object') {
                    favorites = decoded.favs || [];
                    myBarIngredients = decoded.bar || [];
                }
                
                localStorage.setItem('hca_favorites_v1', JSON.stringify(favorites));
                localStorage.setItem('hca_bar_ingredients_v1', JSON.stringify(myBarIngredients));
                
                alert('Sammlung und Bar-Zutaten erfolgreich importiert!');
                location.reload();
            } catch(e) {
                alert('Fehler: Ungültiger Backup-Code!');
            }
        }

        function updateFavUI() {
            const container = document.getElementById('savedLists');
            const favItems = allCocktails.filter(c => favorites.includes(c.name));
            container.innerHTML = favItems.length ? favItems.map(c => {
                const img = document.querySelector(`img[data-name="${c.name}"]`)?.src || '';
                return `
                <div class="flex items-center gap-4 p-3 glass rounded-2xl cursor-pointer hover:bg-white/5 transition" onclick="openDetail('${c.name.replace(/'/g, "\\'")}')">
                    <img src="${img}" class="w-12 h-12 rounded-xl object-cover bg-slate-800">
                    <span class="font-bold text-sm flex-grow truncate">${c.name}</span>
                    <i class="fas fa-trash text-slate-600 hover:text-red-500 p-2" onclick="event.stopPropagation(); toggleFav('${c.name}')"></i>
                </div>`;
            }).join('') : '<p class="text-slate-500 text-sm col-span-full">Deine Sammlung ist noch leer.</p>';
        }

        function openDetail(name) {
            const c = allCocktails.find(x => x.name === name);
            const content = document.getElementById('modalContent');
            const currentImg = document.querySelector(`img[data-name="${name}"]`)?.src;
            
            content.innerHTML = `
                <div class="flex flex-col lg:flex-row">
                    <div class="lg:w-1/2 h-80 lg:h-auto relative">
                        <img src="${currentImg}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-transparent"></div>
                    </div>
                    
                    <div class="lg:w-1/2 p-8 lg:p-12">
                        <div class="mb-6">
                            <span class="text-sky-400 font-bold uppercase tracking-[0.2em] text-[10px] block mb-1">
                                ${c.category || 'Classic'} • ${c.type || 'Cocktail'}
                            </span>
                            <h2 class="text-4xl font-black text-white">${c.name}</h2>
                        </div>

                        <div class="space-y-8">
                            <div>
                                <h4 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Zutaten</h4>
                                <ul class="grid grid-cols-1 gap-2">
                                    ${c.ingredients.map(ing => {
                                        const clean = cleanIngredientName(ing);
                                        const hasIt = myBarIngredients.includes(clean);
                                        return `
                                        <li class="flex items-center justify-between bg-white/5 p-3 rounded-xl border ${hasIt ? 'border-emerald-500/20 bg-emerald-500/5' : 'border-white/5'} text-sm">
                                            <div class="flex items-center gap-3">
                                                <i class="fas fa-vial ${hasIt ? 'text-emerald-400' : 'text-sky-500'} text-xs"></i>
                                                <span class="${hasIt ? 'text-emerald-200 font-medium' : ''}">${ing}</span>
                                            </div>
                                            ${hasIt ? '<span class="text-[10px] bg-emerald-500/20 text-emerald-400 px-2 py-0.5 rounded-md font-bold uppercase tracking-wider">Vorhanden</span>' : ''}
                                        </li>
                                        `;
                                    }).join('')}
                                </ul>
                            </div>

                            <div>
                                <h4 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Zubereitung</h4>
                                <p class="text-slate-300 leading-relaxed italic bg-sky-500/5 p-5 rounded-2xl border-l-2 border-sky-500">
                                    "${c.method}"
                                </p>
                            </div>

                            ${c.notes ? `
                            <div class="bg-amber-500/10 border border-amber-500/20 p-4 rounded-xl">
                                <p class="text-xs text-amber-200/80 italic"><i class="fas fa-info-circle mr-2 text-amber-500"></i>${c.notes}</p>
                            </div>
                            ` : ''}

                            <div class="grid grid-cols-2 gap-4">
                                <div class="bg-slate-900/50 p-4 rounded-2xl border border-white/5">
                                    <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Glas</p>
                                    <p class="text-xs text-slate-200">${c.standard_drinkware || 'Standard Glas'}</p>
                                </div>
                                <div class="bg-slate-900/50 p-4 rounded-2xl border border-white/5">
                                    <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Serviert</p>
                                    <p class="text-xs text-slate-200">${c.served || 'Nach Belieben'}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
            
            document.getElementById('modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        document.getElementById('searchInput').addEventListener('input', applyFilters);

        init();
    </script>
</body>
</html>
